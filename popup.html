<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      color: #222;
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .toggle { position: relative; display: inline-block; width: 42px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ccc;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #00bcd4; }
    input:checked + .slider::before { transform: translateX(18px); }
    .mode-group { display: flex; gap: 6px; }
    .mode-btn {
      flex: 1;
      padding: 5px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .mode-btn.active {
      background: #00bcd4;
      border-color: #00bcd4;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>ABEMA AUTO WIDE</h1>
  <div class="row">
    <label for="enabled">有効</label>
    <label class="toggle">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>
  <div class="row">
    <span>表示モード</span>
    <div class="mode-group">
      <button class="mode-btn" data-mode="wide">ワイド</button>
      <button class="mode-btn" data-mode="widetheatre">ワイドシアター</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
